<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KS1 ALKEBULAN PAY Dashboard</title>
  <style>
    :root { --deep-blue: #002147; --gold: #D4AF37; }
    * { margin:0; padding:0; box-sizing:border-box; font-family:Segoe UI, sans-serif; }
    body { background: var(--deep-blue); color:white; padding:20px; min-height:100vh; display:flex; justify-content:center; align-items:center; }
    .container { max-width:600px; width:100%; text-align:center; }
    h1 { color: var(--gold); margin-bottom:20px; font-size:28px; }
    .card { background:rgba(255,255,255,0.1); padding:20px; border-radius:12px; margin:20px 0; }
    .btn { background: var(--gold); color: var(--deep-blue); border:none; padding:12px 24px; border-radius:8px; font-weight:bold; cursor:pointer; margin-top:20px; width:100%; font-size:16px; }
    footer { margin-top:40px; font-size:12px; color:#bbb; }
  </style>
</head>
<body>
  <div class="container">
    <h1>KS1 ALKEBULAN PAY</h1>
    <div class="card">
      <h2>Welcome, <span id="tradeId">—</span>!</h2>
      <p>Your digital trade identity is active.</p>
      <p>Use this dashboard to access escrow, funding eligibility, and transaction history.</p>
    </div>
    <button class="btn" onclick="logout()">Logout</button>

    <footer>
      <p>© 2026 KS1 ALKEBULAN PAY – A Nonprofit Project By KS1 Empire Group & Foundation (KS1EGF)</p>
    </footer>
  </div>

  <script>
    const tradeId = localStorage.getItem('ks1_tradeId');
    const token = localStorage.getItem('ks1_token');
    if (!token || !tradeId) window.location.href = 'index.html';
    document.getElementById('tradeId').textContent = tradeId;
    function logout() {
      localStorage.removeItem('ks1_token');
      localStorage.removeItem('ks1_tradeId');
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
