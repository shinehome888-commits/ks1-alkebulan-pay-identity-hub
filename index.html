<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KS1 ALKEBULAN PAY – Identity Hub</title>
  <style>
    :root { --deep-blue: #002147; --gold: #D4AF37; }
    * { margin:0; padding:0; box-sizing:border-box; font-family:Segoe UI, sans-serif; }
    body { background: var(--deep-blue); color:white; padding:20px; min-height:100vh; display:flex; justify-content:center; align-items:center; }
    .container { background:rgba(255,255,255,0.08); border-radius:16px; padding:32px; width:100%; max-width:500px; border:1px solid rgba(255,255,255,0.15); text-align:center; }
    h1 { font-size:28px; margin-bottom:4px; }
    .subtitle { color:#ccc; margin-bottom:24px; font-size:16px; }
    input { width:100%; padding:12px; margin:10px 0; border-radius:8px; border:1px solid #ddd; font-size:16px; background: #000; color: white; }
    .btn { background:var(--gold); color:var(--deep-blue); border:none; border-radius:8px; padding:14px; width:100%; font-weight:bold; font-size:16px; cursor:pointer; margin:16px 0; }
    .link { color:#aaa; text-align:center; margin-top:12px; cursor:pointer; }
    .link:hover { text-decoration:underline; }
    footer { margin-top:30px; font-size:12px; color:#bbb; }
  </style>
</head>
<body>
  <div class="container">
    <h1>KS1 ALKEBULAN PAY</h1>
    <p class="subtitle">Register Your Digital Trade Identity</p>

    <input type="text" id="fullName" placeholder="Full Name" required />
    <input type="tel" id="phone" placeholder="WhatsApp Phone (+233...)" required />
    <input type="password" id="password" placeholder="Password" required />
    <button class="btn" onclick="register()">Register & Get KS1 Trade ID</button>
    
    <p class="link" onclick="window.location.href='login.html'">Already have an account? Login</p>

    <footer>
      <p>© 2026 KS1 ALKEBULAN PAY – A Nonprofit Project By KS1 Empire Group & Foundation (KS1EGF)</p>
    </footer>
  </div>

  <script>
    async function register() {
      const fullName = document.getElementById('fullName').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value;

      if (!fullName || !phone || !password) {
        alert('Please fill all fields.');
        return;
      }

      try {
        const res = await fetch('https://ks1-central-auth.onrender.com/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ full_name: fullName, phone, password })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('ks1_jwt_token', data.token);
          alert(`✅ Success! Your KS1 Trade ID: ${data.user_id}`);
          window.location.href = 'dashboard.html';
        } else {
          alert('Registration failed: ' + (data.error || 'Unknown error'));
        }
      } catch (err) {
        alert('Network error. Please check your connection.');
      }
    }
  </script>
</body>
</html>
