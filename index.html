<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KS1 ALKEBULAN PAY – Register</title>
  <style>
    :root { --deep-blue: #002147; --gold: #D4AF37; }
    * { margin:0; padding:0; box-sizing:border-box; font-family:Segoe UI, sans-serif; }
    body { background: var(--deep-blue); color:white; padding:20px; min-height:100vh; }
    .container { max-width: 600px; margin: 0 auto; }
    h1 { text-align:center; font-size:28px; margin:20px 0; color: var(--gold); }
    .form-group { margin:16px 0; }
    label { display:block; margin-bottom:6px; font-weight:bold; }
    input, select { width:100%; padding:12px; border-radius:8px; border:1px solid #555; background:#000; color:white; }
    .btn { background: var(--gold); color: var(--deep-blue); border:none; border-radius:8px; padding:14px; width:100%; font-weight:bold; font-size:16px; cursor:pointer; margin:20px 0; }
    .optional { color:#aaa; font-size:14px; margin-top:4px; }
    footer { text-align:center; margin-top:40px; font-size:12px; color:#bbb; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Register Your Business</h1>
    <form id="registrationForm">
      <!-- Personal Info -->
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" id="fullName" required />
      </div>

      <div class="form-group">
        <label>WhatsApp Number * (Must be active on WhatsApp)</label>
        <input type="tel" id="phone" placeholder="+233240000000" required />
      </div>

      <div class="form-group">
        <label>Password *</label>
        <input type="password" id="password" minlength="6" required />
      </div>

      <div class="form-group">
        <label>Your Birthday *</label>
        <input type="date" id="userBirthday" required />
      </div>

      <!-- Business Info -->
      <div class="form-group">
        <label>Business Name *</label>
        <input type="text" id="businessName" required />
      </div>

      <div class="form-group">
        <label>Business Birthday *</label>
        <input type="date" id="businessBirthday" required />
      </div>

      <div class="form-group">
        <label>Business Type *</label>
        <select id="businessType" required>
          <option value="">Select...</option>
          <option value="Entrepreneur">Entrepreneur</option>
          <option value="Trader">Trader</option>
          <option value="SME">Small & Medium Enterprise (SME)</option>
          <option value="Vendor">Vendor</option>
          <option value="Startup">Startup</option>
          <option value="Cooperative">Cooperative</option>
          <option value="NGO">Non-Governmental Organization (NGO)</option>
          <option value="Freelancer">Freelancer</option>
          <option value="Individual">Individual Trader</option>
        </select>
      </div>

      <div class="form-group">
        <label>Industry *</label>
        <input type="text" id="industry" placeholder="e.g., Agriculture, Retail, Tech" required />
      </div>

      <!-- Location -->
      <div class="form-group">
        <label>Country *</label>
        <select id="country" required>
          <option value="Ghana">Ghana</option>
          <!-- Add more African countries later -->
        </select>
      </div>

      <div class="form-group">
        <label>City / Region *</label>
        <input type="text" id="city" placeholder="e.g., Accra, Kumasi" required />
      </div>

      <div class="form-group">
        <label>Town / Area *</label>
        <input type="text" id="town" placeholder="e.g., Osu, Adum" required />
      </div>

      <div class="form-group">
        <label>Business Address *</label>
        <input type="text" id="address" placeholder="Street, Landmark, etc." required />
      </div>

      <!-- Optional -->
      <div class="form-group">
        <label>Wallet Address (Optional)</label>
        <input type="text" id="wallet" placeholder="e.g., 0x... or TZ..." />
        <div class="optional">You can add or update this later in your dashboard.</div>
      </div>

      <button type="submit" class="btn">Get My KS1 Trade ID</button>
    </form>

    <footer>
      <p>© 2026 KS1 ALKEBULAN PAY – A nonprofit project by KS1 Empire Group & Foundation (KS1EGF)</p>
    </footer>
  </div>

  <script>
    document.getElementById('registrationForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const data = {
        full_name: document.getElementById('fullName').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        password: document.getElementById('password').value,
        user_birthday: document.getElementById('userBirthday').value,
        business_name: document.getElementById('businessName').value.trim(),
        business_birthday: document.getElementById('businessBirthday').value,
        business_type: document.getElementById('businessType').value,
        industry: document.getElementById('industry').value.trim(),
        country: document.getElementById('country').value,
        city: document.getElementById('city').value.trim(),
        town: document.getElementById('town').value.trim(),
        address: document.getElementById('address').value.trim(),
        wallet: document.getElementById('wallet').value.trim() || null
      };

      // Validate required fields
      if (!data.full_name || !data.phone || !data.password || !data.business_name) {
        alert('Please fill all required fields.');
        return;
      }

      try {
        const res = await fetch('https://ks1-central-auth.onrender.com/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const result = await res.json();
        if (res.ok && result.success) {
          localStorage.setItem('ks1_jwt_token', result.token);
          alert(`✅ Registration successful!\nYour KS1 Trade ID: ${result.user_id}`);
          window.location.href = 'dashboard.html';
        } else {
          alert('Registration failed: ' + (result.error || 'Unknown error'));
        }
      } catch (err) {
        console.error('Registration error:', err);
        alert('Network error. Please check your connection.');
      }
    });
  </script>
</body>
</html>
